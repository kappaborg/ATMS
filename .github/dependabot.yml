version: 2

updates:
  # Python dependencies — group runtime vs. test/dev separately so one noisy
  # transitive doesn't drown the safety-critical service deps.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    groups:
      runtime:
        applies-to: version-updates
        patterns:
          - "fastapi"
          - "uvicorn"
          - "aiokafka"
          - "pydantic"
          - "prometheus_client"
      dev:
        applies-to: version-updates
        patterns:
          - "pytest*"
          - "hypothesis"
          - "ruff"
          - "mypy"
          - "coverage"
          - "testcontainers*"

  - package-ecosystem: pip
    directory: "/services/traffic-controller"
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: "/services/decision-engine"
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: "/services/ai-perception"
    schedule:
      interval: weekly

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Docker base images
  - package-ecosystem: docker
    directory: "/services/traffic-controller"
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: "/services/decision-engine"
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: "/services/ai-perception"
    schedule:
      interval: weekly
