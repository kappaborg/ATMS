# ATMS CI pipeline — pull request + main branch validation.
#
# Phase 12.1 deliverable. Gates every code change against:
#   - syntax + lint
#   - type check
#   - unit tests
#   - acceptance tests
#   - failover tests
#
# Production sustaining ops at KJP own deployment automation; this CI
# block validates the code BEFORE it lands in the deploy pipeline.

name: ATMS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check simulation/ services/ scripts/ shared/
      - name: Ruff format check
        run: ruff format --check simulation/ services/ scripts/ shared/

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install mypy
          pip install -e .
      - name: Run mypy
        run: mypy simulation/decision_chamber/ shared/

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-cov puresnmp asn1tools paho-mqtt \
                      psycopg2-binary gtfs-realtime-bindings numpy opencv-python
      - name: Run pytest
        run: pytest simulation/decision_chamber/ -v --cov=simulation/decision_chamber

  acceptance-tests:
    name: Pilot acceptance tests
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install -e .
          pip install puresnmp asn1tools paho-mqtt gtfs-realtime-bindings \
                      numpy opencv-python pyyaml
      - name: Run acceptance suite
        run: |
          python3 scripts/pilot_acceptance_tests.py \
              --site-config services/observability/sarajevo-pilot.yaml \
              --output-report acceptance-report.md
      - name: Upload acceptance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-report
          path: acceptance-report.md

  failover-tests:
    name: Failover scenarios
    runs-on: ubuntu-latest
    needs: [lint, type-check, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install -e .
          pip install puresnmp asn1tools paho-mqtt gtfs-realtime-bindings \
                      numpy opencv-python pyyaml
      - name: Run failover suite
        run: |
          python3 scripts/failover_tests.py \
              --output-report failover-report.md
      - name: Upload failover report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failover-report
          path: failover-report.md

  required-checks:
    name: All required checks passed
    runs-on: ubuntu-latest
    needs: [acceptance-tests, failover-tests]
    if: always()
    steps:
      - name: Verify all checks succeeded
        run: |
          if [ "${{ needs.acceptance-tests.result }}" != "success" ] || \
             [ "${{ needs.failover-tests.result }}" != "success" ]; then
            echo "BLOCKED: required gate failed"
            exit 1
          fi
          echo "All required checks passed — clear to merge"
