name: Nightly

# Runs once per day on the default branch. Catches:
# - drift in dependencies / base images (Trivy filesystem scan)
# - flaky behavior under real infrastructure (full Testcontainers chaos test)
# - new CVEs disclosed since the last CI run
#
# Manual dispatch is available so engineers can trigger it for a specific PR.

on:
  schedule:
    - cron: "17 3 * * *"   # 03:17 UTC daily; avoids the on-the-hour cron rush
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # to post a digest issue if anything new shows up

jobs:
  chaos-kafka:
    name: Failsafe chaos (Testcontainers Kafka)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        working-directory: services/traffic-controller
        run: pip install -r requirements-dev.txt
      - name: Run integration suite (real Kafka)
        working-directory: services/traffic-controller
        run: pytest tests/integration -v -m integration

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
      - uses: actions/upload-artifact@v7
        with:
          name: trivy-fs
          path: trivy-fs.sarif
          retention-days: 30

  open-issue-on-failure:
    name: Open digest issue on failure
    runs-on: ubuntu-latest
    needs: [chaos-kafka, trivy-fs]
    if: failure()
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = `Nightly failure ${new Date().toISOString().slice(0,10)}`;
            const body = [
              `Nightly workflow run failed: ${context.runId}`,
              `Run URL: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Triage:",
              "- [ ] Failure reproducible on main?",
              "- [ ] CVE in `trivy-fs.sarif` artifact?",
              "- [ ] Chaos test exposing a real regression?",
            ].join("\n");
            await github.rest.issues.create({
              ...context.repo,
              title,
              body,
              labels: ["nightly", "triage"],
            });
