# Alembic configuration for ATMS — Phase C4 (ADR-0013).
# DB URL is overridden at runtime by env.py reading AtmsBaseSettings.

[alembic]
script_location = alembic
prepend_sys_path = .
# Disable interpolation so URL with % characters works.
sqlalchemy.url =

timezone = UTC
# Allow downgrade by N steps.
revision_environment = false

# Don't truncate slug — clear migration filenames help on-call.
truncate_slug_length = 60

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
