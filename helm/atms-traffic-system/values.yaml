global:
  namespace: atms-system
  imageRegistry: ""
  imagePullSecrets: []

# AI Perception Service
aiPerception:
  enabled: true
  replicaCount: 2
  image:
    repository: atms/ai-perception
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# Decision Engine Service
decisionEngine:
  enabled: true
  replicaCount: 2
  image:
    repository: atms/decision-engine
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Sensor Fusion Service
sensorFusion:
  enabled: true
  replicaCount: 2
  image:
    repository: atms/sensor-fusion
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

# Video Processor Service
videoProcessor:
  enabled: true
  replicaCount: 2
  image:
    repository: atms/video-processor
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi

# API Gateway Service
apiGateway:
  enabled: true
  replicaCount: 2
  image:
    repository: atms/api-gateway
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Dashboard Service
dashboard:
  enabled: true
  replicaCount: 1
  image:
    repository: atms/dashboard
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Analytics Service
analytics:
  enabled: true
  replicaCount: 2
  image:
    repository: atms/analytics
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

# Data Aggregator Service
dataAggregator:
  enabled: true
  replicaCount: 2
  image:
    repository: atms/data-aggregator
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

# Traffic Controller Service
trafficController:
  enabled: true
  replicaCount: 2
  image:
    repository: atms/traffic-controller
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Infrastructure dependencies (external)
kafka:
  enabled: false  # Use external Kafka
  bootstrapServers: "kafka:29092"

redis:
  enabled: false  # Use external Redis
  host: "redis"
  port: 6379

postgres:
  enabled: false  # Use external PostgreSQL
  host: "postgres"
  port: 5432
  database: "atms"
  user: "atms_user"
  password: "atms_password"

# Monitoring
monitoring:
  enabled: true
  prometheus:
    enabled: true
    scrapeInterval: 30s
  grafana:
    enabled: true

# Ingress
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: api.traffic.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

