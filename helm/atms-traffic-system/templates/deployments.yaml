{{- $services := include "atms.services" . | fromYaml }}
{{- range $key, $svc := $services }}
{{- $cfg := index $.Values $key }}
{{- if and $cfg $cfg.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $svc.name }}
    {{- include "atms.labels" $ | nindent 4 }}
spec:
  replicas: {{ $cfg.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ $svc.name }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
        {{- include "atms.labels" $ | nindent 8 }}
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $svc.name }}
          image: {{ include "atms.image" (dict "root" $ "cfg" $cfg) }}
          imagePullPolicy: {{ $cfg.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ $.Values.kafka.bootstrapServers | quote }}
            - name: REDIS_HOST
              value: {{ $.Values.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ $.Values.redis.port | quote }}
            - name: POSTGRES_HOST
              value: {{ $.Values.postgres.host | quote }}
            - name: POSTGRES_PORT
              value: {{ $.Values.postgres.port | quote }}
            - name: POSTGRES_DB
              value: {{ $.Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ $.Values.postgres.user | quote }}
            # Secrets come from the SOPS-materialised `atms-secrets`
            # (ADR-0002) — never from values.yaml.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atms-secrets
                  key: postgres.password
                  optional: true
            - name: AUTH_HS256_SECRET
              valueFrom:
                secretKeyRef:
                  name: atms-secrets
                  key: jwt.secret
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
{{- end }}
{{- end }}
