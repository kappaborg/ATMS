{{- $services := include "atms.services" . | fromYaml }}
{{- range $key, $svc := $services }}
{{- $cfg := index $.Values $key }}
{{- if and $cfg $cfg.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $svc.name }}
    {{- include "atms.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ $svc.name }}
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: http
{{- end }}
{{- end }}
