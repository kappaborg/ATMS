apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-engine
  namespace: atms-system
  labels:
    app: decision-engine
    version: v1
    component: decision
spec:
  replicas: 2
  selector:
    matchLabels:
      app: decision-engine
  template:
    metadata:
      labels:
        app: decision-engine
        version: v1
        component: decision
    spec:
      containers:
      - name: decision-engine
        image: atms/decision-engine:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8007
          name: http
          protocol: TCP
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: atms-config
              key: kafka.bootstrap.servers
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: atms-config
              key: redis.host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: atms-config
              key: redis.port
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: atms-config
              key: postgres.host
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8007
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8007
          initialDelaySeconds: 15
          periodSeconds: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: decision-engine
  namespace: atms-system
  labels:
    app: decision-engine
spec:
  type: ClusterIP
  ports:
  - port: 8007
    targetPort: 8007
    protocol: TCP
    name: http
  selector:
    app: decision-engine

