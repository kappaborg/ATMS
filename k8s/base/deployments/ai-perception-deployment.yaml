apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-perception
  namespace: atms-system
  labels:
    app: ai-perception
    version: v1
    component: perception
spec:
  replicas: 1  # Reduced for single-node cluster (HPA will scale up)
  selector:
    matchLabels:
      app: ai-perception
  template:
    metadata:
      labels:
        app: ai-perception
        version: v1
        component: perception
    spec:
      containers:
      - name: ai-perception
        image: atms/ai-perception:latest
        imagePullPolicy: Always  # Changed to Always to ensure fresh image
        ports:
        - containerPort: 8004
          name: http
          protocol: TCP
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: atms-config
              key: kafka.bootstrap.servers
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: atms-config
              key: redis.host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: atms-config
              key: redis.port
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: atms-config
              key: postgres.host
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: atms-config
              key: postgres.port
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: atms-config
              key: postgres.database
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: atms-secrets
              key: postgres.user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: atms-secrets
              key: postgres.password
        resources:
          requests:
            cpu: "500m"      # Reduced for single-node cluster
            memory: "1Gi"     # Reduced for single-node cluster
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 40
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health  # Changed from /ready (endpoint doesn't exist)
            port: 8004
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: models
          mountPath: /app/models
          readOnly: true
        - name: config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: models-pvc
      - name: config
        configMap:
          name: ai-perception-config
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: ai-perception
  namespace: atms-system
  labels:
    app: ai-perception
spec:
  type: ClusterIP
  ports:
  - port: 8004
    targetPort: 8004
    protocol: TCP
    name: http
  selector:
    app: ai-perception

