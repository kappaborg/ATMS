apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: atms-system
spec:
  accessModes:
    - ReadWriteOnce  # Changed from ReadOnlyMany (not supported by standard storage class)
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-pvc
  namespace: atms-system
spec:
  accessModes:
    - ReadWriteOnce  # Changed from ReadWriteMany (not supported by standard storage class)
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard

