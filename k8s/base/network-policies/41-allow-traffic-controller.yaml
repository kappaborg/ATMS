---
# Traffic-controller ingress — operator-facing endpoints only from the
# api-gateway. Plus probes from kube-system.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: traffic-controller-ingress
  namespace: atms
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traffic-controller
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 8003
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8003
