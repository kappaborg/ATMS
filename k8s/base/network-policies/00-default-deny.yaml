---
# Default-deny in the atms namespace. Stack mTLS (Linkerd, ADR-0012) on top —
# any allowed flow must be both mesh-authorized AND policy-allowed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: atms
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
