---
# Allow ingress to decision-engine HTTP only from api-gateway and dashboard.
# Combined with Linkerd authz (ADR-0012), the mesh enforces ServiceAccount
# identity in addition to the network-level filter.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: decision-engine-ingress
  namespace: atms
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: decision-engine
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: dashboard
      ports:
        - protocol: TCP
          port: 8007
    # Probes from kube-system (kubelet) — allow on the probe ports only.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8007
