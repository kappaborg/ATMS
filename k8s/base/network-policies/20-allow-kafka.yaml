---
# Every ATMS pod may speak to Kafka. Stack with Kafka client-side ACLs for
# per-topic auth (out of scope for B5 — tracked separately).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-egress
  namespace: atms
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka
      ports:
        - protocol: TCP
          port: 9092
