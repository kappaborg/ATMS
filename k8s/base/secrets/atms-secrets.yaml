# This file is intentionally NOT a Secret manifest.
#
# Phase A5 / ADR-0002: secrets are SOPS-encrypted under `deploy/secrets/<env>/`
# and decrypted at GitOps sync time by Flux (or kustomize-sops in an ArgoCD
# setup). They are NEVER committed as plaintext.
#
# To consume secrets in a Pod, apply the overlay for your environment:
#
#     kubectl apply -k k8s/overlays/dev/
#
# The overlay's kustomization.yaml uses a Flux `SecretGenerator` (or
# kustomize-sops) to materialise `atms-secrets` from the encrypted source.
#
# See:
#   - deploy/secrets/README.md
#   - docs/runbooks/secrets.md
#   - .sops.yaml
#   - k8s/overlays/dev/kustomization.yaml
---
# Empty placeholder so kustomize doesn't fail if this file is referenced from
# base/kustomization.yaml. Production secrets come from the overlay.
apiVersion: v1
kind: List
items: []
