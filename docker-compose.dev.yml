version: '3.8'

services:
  # ============================================
  # DATABASE - PostgreSQL
  # ============================================
  postgres:
    image: timescale/timescaledb:2.17.2-pg14
    container_name: atms-postgres
    environment:
      POSTGRES_DB: atms_db
      POSTGRES_USER: atms_user
      POSTGRES_PASSWORD: atms_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - atms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atms_user -d atms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # CACHE - Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: atms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - atms-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MESSAGE QUEUE - Apache Kafka
  # ============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: atms-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - atms-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: atms-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - atms-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ============================================
  # MONITORING - Prometheus
  # ============================================
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: atms-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infrastructure/monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - atms-network

  # ============================================
  # MONITORING - Alertmanager
  # ============================================
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: atms-alertmanager
    ports:
      # Host 9094 — kafka already claims host port 9093 in this file.
      - "9094:9093"
    volumes:
      - ./infrastructure/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    restart: unless-stopped
    networks:
      - atms-network

  # ============================================
  # MONITORING - Grafana
  # ============================================
  grafana:
    image: grafana/grafana:10.4.1
    container_name: atms-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana-provisioning:/etc/grafana/provisioning
    networks:
      - atms-network
    depends_on:
      - prometheus

  # ============================================
  # KAFKA UI (Development Tool)
  # ============================================
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: atms-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: atms-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - atms-network
    depends_on:
      - kafka

  # ============================================
  # DATABASE ADMIN - pgAdmin (Development Tool)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: atms-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@atms.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - atms-network
    depends_on:
      - postgres

networks:
  atms-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

