# Alertmanager configuration for the ATMS dev stack.
#
# Dev default: alerts go to a webhook logger you can watch with
# `docker logs -f atms-alertmanager` or point at any HTTP sink.
# Production: replace the receivers with PagerDuty / Opsgenie / Slack —
# credentials via SOPS (ADR-0002), never inline here.

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, intersection_id]
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 4h
  routes:
    # Safety-critical: no grouping delay, aggressive repeat.
    - matchers:
        - severity = "critical"
      receiver: critical
      group_wait: 0s
      repeat_interval: 30m

receivers:
  # Dev receiver: POSTs alert JSON to a local echo endpoint. Replace the
  # URL with your real sink (Slack webhook proxy, ntfy.sh topic, etc.).
  - name: default
    webhook_configs:
      - url: "http://host.docker.internal:9999/alerts"
        send_resolved: true

  - name: critical
    webhook_configs:
      - url: "http://host.docker.internal:9999/alerts"
        send_resolved: true
    # PRODUCTION: add pagerduty_configs / opsgenie_configs here.

inhibit_rules:
  # An intersection in ALL_RED_FLASH already pages — suppress the softer
  # fixed-time / staleness warnings for the same intersection meanwhile.
  - source_matchers:
      - alertname = "ControllerAllRedFlash"
    target_matchers:
      - severity = "warning"
    equal: [intersection_id]
