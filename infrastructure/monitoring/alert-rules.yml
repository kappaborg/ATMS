# Prometheus alerting rules for the ATMS stack.
#
# Every expression below uses a metric the code actually emits
# (verified against services/traffic-controller/src/failsafe.py,
# shared/atms_common/resilience.py and monitoring/metrics.py).
#
# Wire-up: referenced from `rule_files:` in prometheus.yml. Routing to a
# receiver (PagerDuty/Slack/email) needs an Alertmanager instance —
# tracked as a production gap until one is deployed.

groups:
  - name: atms-availability
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} target is down"
          description: "Prometheus has not been able to scrape {{ $labels.job }} ({{ $labels.instance }}) for 2 minutes."

  - name: atms-safety
    rules:
      # ALL_RED_FLASH is operator-recovery-only (ADR-0005) — page immediately.
      - alert: ControllerAllRedFlash
        expr: atms_controller_mode{mode="all_red_flash"} == 1
        labels:
          severity: critical
        annotations:
          summary: "Intersection {{ $labels.intersection_id }} is in ALL_RED_FLASH"
          description: "The failsafe controller escalated to ALL_RED_FLASH. Recovery requires an operator safety walk-through; it will not self-recover."

      # Fixed-time fallback is safe but means the AI path is unhealthy.
      - alert: ControllerInFixedTime
        expr: atms_controller_mode{mode="fixed_time"} == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Intersection {{ $labels.intersection_id }} running fixed-time for 10m+"
          description: "AI-adaptive control has been degraded to the RiLSA fixed-time plan for over 10 minutes. Check decision-engine and ai-perception health."

      - alert: ControllerModeFlapping
        expr: sum by (intersection_id) (increase(atms_controller_mode_transitions_total[10m])) > 4
        labels:
          severity: warning
        annotations:
          summary: "Intersection {{ $labels.intersection_id }} controller mode is flapping"
          description: "More than 4 mode transitions in 10 minutes — one more flap window may trigger ALL_RED_FLASH escalation."

      - alert: AIDecisionStale
        expr: atms_controller_ai_decision_age_ms > 2000
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "AI decisions stale at intersection {{ $labels.intersection_id }}"
          description: "Last accepted AI decision is older than the 2s staleness budget (ATMS_MAX_AI_STALENESS_MS); the controller is at or past its fixed-time fallback threshold."

  - name: atms-resilience
    rules:
      - alert: CircuitBreakerOpen
        expr: atms_circuit_breaker_state{state="open"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker {{ $labels.name }} open for 5m+"
          description: "A dependency has been failing long enough to hold its breaker open for 5 minutes."

      - alert: BulkheadSaturated
        expr: increase(atms_bulkhead_saturated_total[5m]) > 10
        labels:
          severity: warning
        annotations:
          summary: "Bulkhead {{ $labels.name }} rejecting work"
          description: "More than 10 bulkhead saturation rejections in 5 minutes — the service is shedding load."

  - name: atms-pipeline
    rules:
      # Emitted by the standalone video pipeline (monitoring/metrics.py).
      - alert: VideoPipelineStalled
        expr: rate(traffic_detections_total[5m]) == 0 and traffic_fps_current > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Video pipeline produces frames but no detections"
          description: "FPS is non-zero while the detection rate has been zero for 5 minutes — model failure or misconfigured thresholds."

      - alert: KafkaPublishErrors
        expr: increase(traffic_kafka_errors_total[5m]) > 0
        labels:
          severity: warning
        annotations:
          summary: "Kafka publish errors in the video pipeline"
          description: "{{ $value }} Kafka errors in the last 5 minutes — downstream consumers may be missing detections."
