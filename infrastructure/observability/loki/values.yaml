# Loki Helm values — single-binary mode for dev. Patch per env via Flux.
# Chart: grafana/loki (https://github.com/grafana/loki/tree/main/production/helm/loki)

deploymentMode: SingleBinary

loki:
  auth_enabled: false  # multi-tenant disabled in single-cluster pilots
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    # Per ADR-0011: keep label cardinality low.
    max_global_streams_per_user: 5000
    cardinality_limit: 100000
    retention_period: 168h  # 7d dev default; prod overlay sets 2160h (90d)
    # Reject log lines older than this — drops legacy stragglers.
    reject_old_samples: true
    reject_old_samples_max_age: 168h

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 50Gi
    storageClass: "standard"  # adjust to the cluster's storage class

monitoring:
  selfMonitoring:
    enabled: false  # avoid recursive instrumentation in dev
  lokiCanary:
    enabled: false

gateway:
  enabled: true
  replicas: 1
