services:
  # ============================================
  # AI PERCEPTION SERVICE
  # ============================================
  ai-perception:
    build:
      context: .
      dockerfile: services/ai-perception/Dockerfile
    image: atms/ai-perception:latest
    container_name: atms-ai-perception
    ports:
      - "8004:8004"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=atms
      - POSTGRES_USER=atms_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - ./models:/app/models:ro
      - ./config:/app/config:ro
      - ./services/ai-perception/models:/app/models:ro
    networks:
      - atms-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # ============================================
  # DECISION ENGINE SERVICE
  # ============================================
  decision-engine:
    build:
      context: .
      dockerfile: services/decision-engine/Dockerfile
    image: atms/decision-engine:latest
    container_name: atms-decision-engine
    ports:
      - "8007:8007"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=atms
      - POSTGRES_USER=atms_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    networks:
      - atms-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ============================================
  # SENSOR FUSION SERVICE
  # ============================================
  sensor-fusion:
    build:
      context: .
      dockerfile: services/sensor-fusion/Dockerfile
    image: atms/sensor-fusion:latest
    container_name: atms-sensor-fusion
    ports:
      - "8008:8008"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - atms-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # ============================================
  # VIDEO PROCESSOR SERVICE
  # ============================================
  video-processor:
    build:
      context: .
      dockerfile: services/video-processor/Dockerfile
    image: atms/video-processor:latest
    container_name: atms-video-processor
    ports:
      - "8018:8018"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - atms-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # ============================================
  # API GATEWAY SERVICE
  # ============================================
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    image: atms/api-gateway:latest
    container_name: atms-api-gateway
    ports:
      - "8000:8000"
    environment:
      - AI_PERCEPTION_URL=http://ai-perception:8004
      - DECISION_ENGINE_URL=http://decision-engine:8007
      - SENSOR_FUSION_URL=http://sensor-fusion:8008
      - VIDEO_PROCESSOR_URL=http://video-processor:8018
      # Provision API keys via the environment / .env, never in source.
      - ATMS_API_KEYS=${ATMS_API_KEYS:-}
    networks:
      - atms-network
    depends_on:
      - ai-perception
      - decision-engine
      - sensor-fusion
      - video-processor
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # DASHBOARD SERVICE
  # ============================================
  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    image: atms/dashboard:latest
    container_name: atms-dashboard
    ports:
      - "8006:8006"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - atms-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # ANALYTICS SERVICE
  # ============================================
  analytics:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    image: atms/analytics:latest
    container_name: atms-analytics
    ports:
      - "8005:8005"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=atms
      - POSTGRES_USER=atms_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    networks:
      - atms-network
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # ============================================
  # DATA AGGREGATOR SERVICE
  # ============================================
  data-aggregator:
    build:
      context: .
      dockerfile: services/data-aggregator/Dockerfile
    image: atms/data-aggregator:latest
    container_name: atms-data-aggregator
    ports:
      - "8009:8009"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=atms
      - POSTGRES_USER=atms_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    networks:
      - atms-network
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # ============================================
  # TRAFFIC CONTROLLER SERVICE
  # ============================================
  traffic-controller:
    build:
      context: .
      dockerfile: services/traffic-controller/Dockerfile
    image: atms/traffic-controller:latest
    container_name: atms-traffic-controller
    ports:
      - "8010:8010"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DECISION_ENGINE_URL=http://decision-engine:8007
    networks:
      - atms-network
    depends_on:
      kafka:
        condition: service_healthy
      decision-engine:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  atms-network:
    external: true

