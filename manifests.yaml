apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: atms-traffic-system
    app.kubernetes.io/version: 1.0.0
    environment: production
    name: atms-system
  name: atms-system
---
apiVersion: v1
data:
  confidence.threshold: "0.42"
  fps.target: "30"
  model.path: /app/models/yolov8n.pt
  processing.height: "720"
  processing.width: "1280"
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: atms-traffic-system
    app.kubernetes.io/version: 1.0.0
  name: ai-perception-config
  namespace: atms-system
---
apiVersion: v1
data:
  grafana.url: http://grafana:3000
  kafka.bootstrap.servers: kafka:29092
  postgres.database: atms
  postgres.host: postgres
  postgres.port: "5432"
  prometheus.url: http://prometheus:9090
  redis.host: redis
  redis.port: "6379"
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: atms-traffic-system
    app.kubernetes.io/version: 1.0.0
  name: atms-config
  namespace: atms-system
---
# NOTE (ADR-0002): the `atms-secrets` Secret is intentionally NOT defined here.
# Plaintext secrets must never live in a manifest. Materialise `atms-secrets`
# from the SOPS-encrypted sources under deploy/secrets/<env>/ via the
# environment overlay (see k8s/base/secrets/atms-secrets.yaml and
# k8s/overlays/dev/kustomization.yaml). Deployments below reference
# `atms-secrets` and will not start until it is provided.
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: ai-perception
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: atms-traffic-system
    app.kubernetes.io/version: 1.0.0
  name: ai-perception
  namespace: atms-system
spec:
  ports:
  - name: http
    port: 8004
    protocol: TCP
    targetPort: 8004
  selector:
    app: ai-perception
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: atms-traffic-system
    app.kubernetes.io/version: 1.0.0
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: decision-engine
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: atms-traffic-system
    app.kubernetes.io/version: 1.0.0
  name: decision-engine
  namespace: atms-system
spec:
  ports:
  - name: http
    port: 8007
    protocol: TCP
    targetPort: 8007
  selector:
    app: decision-engine
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: atms-traffic-system
    app.kubernetes.io/version: 1.0.0
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: atms-traffic-system
    app.kubernetes.io/version: 1.0.0
  name: data-pvc
  namespace: atms-system
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: atms-traffic-system
    app.kubernetes.io/version: 1.0.0
  name: models-pvc
  namespace: atms-system
spec:
  accessModes:
  - ReadOnlyMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ai-perception
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: atms-traffic-system
    app.kubernetes.io/version: 1.0.0
    component: perception
    version: v1
  name: ai-perception
  namespace: atms-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-perception
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/name: atms-traffic-system
      app.kubernetes.io/version: 1.0.0
  template:
    metadata:
      labels:
        app: ai-perception
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/name: atms-traffic-system
        app.kubernetes.io/version: 1.0.0
        component: perception
        version: v1
    spec:
      containers:
      - env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              key: kafka.bootstrap.servers
              name: atms-config
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              key: redis.host
              name: atms-config
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              key: redis.port
              name: atms-config
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              key: postgres.host
              name: atms-config
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              key: postgres.port
              name: atms-config
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              key: postgres.database
              name: atms-config
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: postgres.user
              name: atms-secrets
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: postgres.password
              name: atms-secrets
        image: atms/ai-perception:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 40
          periodSeconds: 30
          timeoutSeconds: 10
        name: ai-perception
        ports:
        - containerPort: 8004
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /ready
            port: 8004
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          limits:
            cpu: 2000m
            memory: 4Gi
          requests:
            cpu: 1000m
            memory: 2Gi
        volumeMounts:
        - mountPath: /app/models
          name: models
          readOnly: true
        - mountPath: /app/config
          name: config
          readOnly: true
      restartPolicy: Always
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: models-pvc
      - configMap:
          name: ai-perception-config
        name: config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: decision-engine
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: atms-traffic-system
    app.kubernetes.io/version: 1.0.0
    component: decision
    version: v1
  name: decision-engine
  namespace: atms-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: decision-engine
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/name: atms-traffic-system
      app.kubernetes.io/version: 1.0.0
  template:
    metadata:
      labels:
        app: decision-engine
        app.kubernetes.io/managed-by: kustomize
        app.kubernetes.io/name: atms-traffic-system
        app.kubernetes.io/version: 1.0.0
        component: decision
        version: v1
    spec:
      containers:
      - env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              key: kafka.bootstrap.servers
              name: atms-config
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              key: redis.host
              name: atms-config
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              key: redis.port
              name: atms-config
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              key: postgres.host
              name: atms-config
        image: atms/decision-engine:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /health
            port: 8007
          initialDelaySeconds: 30
          periodSeconds: 30
        name: decision-engine
        ports:
        - containerPort: 8007
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /ready
            port: 8007
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: 1000m
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
      restartPolicy: Always
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: atms-traffic-system
    app.kubernetes.io/version: 1.0.0
  name: ai-perception-hpa
  namespace: atms-system
spec:
  behavior:
    scaleDown:
      policies:
      - periodSeconds: 60
        type: Percent
        value: 50
      stabilizationWindowSeconds: 300
    scaleUp:
      policies:
      - periodSeconds: 15
        type: Percent
        value: 100
      - periodSeconds: 15
        type: Pods
        value: 2
      selectPolicy: Max
      stabilizationWindowSeconds: 0
  maxReplicas: 10
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 70
        type: Utilization
    type: Resource
  - resource:
      name: memory
      target:
        averageUtilization: 80
        type: Utilization
    type: Resource
  minReplicas: 2
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-perception
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app: ai-perception
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: atms-traffic-system
    app.kubernetes.io/version: 1.0.0
  name: ai-perception
  namespace: atms-system
spec:
  endpoints:
  - interval: 30s
    path: /metrics
    port: http
    scrapeTimeout: 10s
  selector:
    matchLabels:
      app: ai-perception
