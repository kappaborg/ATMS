# ATMS operator console — oauth2-proxy config bridging nginx → Keycloak.
#
# Reference: https://oauth2-proxy.github.io/oauth2-proxy/configuration/
#
# Install on the same edge node as the chamber + Streamlit:
#   apt install oauth2-proxy
# or
#   docker run quay.io/oauth2-proxy/oauth2-proxy
#
# Run as systemd unit alongside chamber + streamlit.

# Bind oauth2-proxy to localhost — nginx upstream calls it
http_address = "127.0.0.1:4180"

# Keycloak realm — KJP/KS operations side
provider              = "keycloak-oidc"
oidc_issuer_url       = "https://keycloak.kjp.local/realms/atms-sarajevo"
redirect_url          = "https://atms-console.kjp.local/oauth2/callback"

# Client credentials — Keycloak admin generates these per environment.
# In production these come from a secrets manager via systemd
# EnvironmentFile, not from this file.
client_id     = "atms-operator-console"
client_secret = "${OAUTH2_CLIENT_SECRET}"

# Cookie config — sign with a random 32-char secret per deployment
cookie_secret = "${OAUTH2_COOKIE_SECRET}"
cookie_name   = "_atms_session"
cookie_secure = true
cookie_httponly = true
cookie_expire = "12h"  # operator shift length

# Required scopes — Keycloak realm exposes group claims under these
scope = "openid email profile groups"

# Email whitelist (empty = allow all authenticated)
email_domains = ["*"]

# Group restriction — only Keycloak users in these groups can access
# the operator console. Operations admin can grant access per role:
# - kjp-operators: shift workers (full access)
# - kjp-engineers: technical reviewers (full access)
# - kjp-auditors:  read-only investigators (limited via app-level RBAC)
allowed_groups = "kjp-operators,kjp-engineers,kjp-auditors"

# Pass identity info to upstream as headers (consumed by Streamlit logs)
set_xauthrequest = true
pass_user_headers = true
pass_authorization_header = true

# Logging
auth_logging = true
request_logging = true
standard_logging = true

# Healthcheck — nginx /healthz uses this transparently
ping_path = "/ping"
