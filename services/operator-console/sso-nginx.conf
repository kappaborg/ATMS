# ATMS operator console — Keycloak SSO reverse proxy.
#
# Phase 10.4 production deployment pattern. Streamlit doesn't have
# built-in authentication; for a Kanton Sarajevo / KJP pilot we put
# nginx + auth_request in front of it, validated against Keycloak.
#
# Architecture:
#
#     operator browser
#         │
#         ▼
#     nginx (this config) — port 443 + TLS termination
#         │ ← cookie missing or expired? → redirect to /login (Keycloak)
#         │
#         ▼ ← cookie validated by auth_request → /oauth2/auth
#     streamlit (port 8501, only bound to 127.0.0.1)
#
# Keycloak realm setup (operations side):
# - Realm: atms-sarajevo
# - Client: atms-operator-console (OIDC, confidential)
# - Roles: chamber-viewer, chamber-operator, chamber-admin
#   - chamber-viewer  → read-only console access
#   - chamber-operator → can press ped/emergency buttons
#   - chamber-admin   → can edit site config + restart chamber
#
# This file is a reference template; per-deployment values (server_name,
# Keycloak URL, client_id, client_secret) must be filled in by KJP ops.

upstream streamlit_app {
    server 127.0.0.1:8501;
    keepalive 32;
}

upstream oauth2_proxy {
    server 127.0.0.1:4180;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name atms-console.kjp.local;  # TBD per ops

    # TLS — replace with actual certificate paths
    ssl_certificate     /etc/atms/tls/atms-console.crt;
    ssl_certificate_key /etc/atms/tls/atms-console.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!3DES;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # OAuth2 proxy callback endpoints — Keycloak redirects here
    location /oauth2/ {
        proxy_pass http://oauth2_proxy;
        proxy_set_header Host                    $host;
        proxy_set_header X-Real-IP               $remote_addr;
        proxy_set_header X-Scheme                $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    # auth_request endpoint — used by every protected location below
    location = /oauth2/auth {
        internal;
        proxy_pass       http://oauth2_proxy;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Scheme         $scheme;
        proxy_set_header Content-Length   "";
        proxy_pass_request_body           off;
    }

    # Main application — protected
    location / {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in;

        # Forward authenticated user info to Streamlit (read in app via
        # st.context.headers — though Streamlit doesn't expose this yet
        # so logging only)
        auth_request_set $email  $upstream_http_x_auth_request_email;
        auth_request_set $user   $upstream_http_x_auth_request_user;
        auth_request_set $groups $upstream_http_x_auth_request_groups;

        proxy_set_header X-Atms-Email  $email;
        proxy_set_header X-Atms-User   $user;
        proxy_set_header X-Atms-Groups $groups;

        # Streamlit needs WebSocket upgrade
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400;
        proxy_pass         http://streamlit_app;
    }

    # Sign-in route — triggers Keycloak OIDC flow
    location /oauth2/sign_in {
        proxy_pass       http://oauth2_proxy;
        proxy_set_header Host                    $host;
        proxy_set_header X-Real-IP               $remote_addr;
        proxy_set_header X-Scheme                $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    # Health endpoint — bypasses auth so Prometheus can scrape
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}

# Force-redirect HTTP → HTTPS
server {
    listen      80;
    server_name atms-console.kjp.local;
    return      301 https://$server_name$request_uri;
}
