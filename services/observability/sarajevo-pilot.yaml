# ATMS Pilot — Sarajevo, Bosnia and Herzegovina.
#
# Reference intersection: Marijin Dvor (Hiseta + Trg BiH junction).
# Site survey + controller spec needed to fill the TBD fields below.
#
# Pilot status: pre-deployment template. Replace TBD values with site
# survey + ops handoff data before production.

intersection_id: sarajevo-marijindvor-001
description: "Sarajevo Marijin Dvor — pilot intersection (Hiseta × Trg BiH)"

camera:
  # CALIBRATE: site survey will measure with reference markers.
  # 25 px/m is a wide-angle starting placeholder; revisit after survey.
  pixels_per_meter: 25.0
  # PRODUCTION: RTSP URL from the installed PoE camera.
  source: rtsp://10.42.10.5:554/Streaming/Channels/101  # TBD per install
  width: 1920
  height: 1080

crosswalk_zones:
  # TBD: site survey will give exact pixel coords. The heuristic below
  # works for a typical wide-angle camera mounted at the intersection's
  # NE corner, but per-site polygon is the production answer.
  north_south: [0, 810, 1920, 1080]   # placeholder bottom strip
  east_west:   [0, 0, 480, 1080]      # placeholder left strip

ntcip:
  # PRODUCTION: confirm with KJP "Park" controller install. Sarajevo is
  # moving from Marvell legacy boxes to Swarco/Yunex on the major
  # corridors as of 2024-2025. NTCIP-1202 baseline assumed.
  controller_host: 10.42.10.10  # TBD per install
  controller_port: 161
  community: sarajevo-pilot-readwrite  # SNMPv1 fallback only; v3 used in prod
  closed_loop_poll_seconds: 1.5
  # SNMPv3 production config — HMAC-SHA1 + AES-CFB-128 (authPriv).
  # Per KJP ops policy, SNMPv1 community auth is NOT acceptable for
  # production write access. Passphrases stored in KJP HSM and
  # injected via systemd `EnvironmentFile=/etc/atms/secrets.env`.
  snmp_version: 3
  v3_username: atms-chamber-sarajevo
  v3_auth_passphrase: ${ATMS_NTCIP_AUTH_KEY}   # injected from KJP HSM
  v3_priv_passphrase: ${ATMS_NTCIP_PRIV_KEY}   # injected from KJP HSM
  v3_security_level: authPriv

mqtt:
  # Multi-intersection mesh — coordinate with Sarajevo Smart City project
  # (Kanton Sarajevo IT) for broker placement. Likely on the KJP
  # operations network with TLS via VPN.
  broker_host: ""  # disabled in pilot phase 1; enable for arterial coord
  broker_port: 1883
  upstream_neighbors: []
  # Future: when Hiseta corridor (4 intersections from Marijin Dvor to
  # Skenderija) goes online, list upstream IDs here for green wave.

green_wave: []

transit_priority:
  # GRAS (Gradski saobraćaj Sarajevo) — trolleybus + bus operator.
  # CONFIRM: GRAS does not yet publish GTFS-RT publicly as of 2024;
  # pilot may need a direct AVL feed integration via GRAS dispatch.
  # Once GTFS-RT lands at api.smartsarajevo.ba (planned 2025), update:
  feed_url: ""  # TBD — coordinate with GRAS / KS IT
  delay_threshold_s: 90.0  # GRAS publishes 1-minute precision schedules
  poll_interval_s: 15.0    # respect GRAS rate limits
  bonus_per_late_bus: 0.15  # slightly stronger than UK default given
                            # higher BiH transit modal share + need to
                            # incentivise trolleybus reliability
  routes:
    # GRAS routes through Marijin Dvor (informational; verify with op):
    # trolejbus-103: north_south    # Otoka — Vijećnica via Marijin Dvor
    # trolejbus-105: east_west      # Dobrinja — Vijećnica
    # autobus-31E:   north_south    # Hrasno — Vijećnica
    # autobus-32:    east_west      # Skenderija — Pofalići
    {}

prometheus:
  listen_host: 0.0.0.0
  listen_port: 9090

audit:
  # Persistent storage on the edge node; archive job forwards rotated
  # DBs to KJP central archive (Phase 6 TimescaleDB forwarder).
  db_path: /var/lib/atms/sarajevo-marijindvor-001.db
  max_size_mb: 500
  retention_days: 180

region:
  country_code: BA
  pilot_city: Sarajevo
  emission_overlay: services/observability/bosnia-fleet-multipliers.yaml
  operator_locale: bs

# Pilot operations contacts (informational):
# - KJP "Park" — signal controller maintenance + NTCIP commissioning
# - Kanton Sarajevo Ministarstvo prometa — pilot oversight + permits
# - GRAS — transit signal priority + route mapping
# - JU "Direkcija za ceste KS" — corridor coordination for arterial scaling
