# docker-compose.keycloak.yml
#
# Local-development Keycloak for OIDC integration testing — Phase A6 RS256
# cutover (ADR-0006). Stands up a single Keycloak realm `atms` pre-configured
# with the per-service clients and the four RBAC roles (viewer / operator /
# engineer / admin).
#
# Runbook: docs/runbooks/oidc-keycloak.md
#
# NEVER use this configuration in production:
# - Admin password is `admin` / `admin`
# - All client secrets are well-known
# - HTTPS is disabled
# - The realm export bundles dev user passwords in plaintext
#
# Production deployment uses the operator's existing IdP (Keycloak, Auth0,
# Azure AD, etc.) with a separate realm export reviewed by security.
#
# Usage:
#   docker compose -f docker-compose.keycloak.yml up -d
#   curl http://localhost:8080/realms/atms/.well-known/openid-configuration

services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: atms-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak-dev-only
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: atms-keycloak
    depends_on:
      keycloak-db:
        condition: service_healthy
    command:
      - start-dev
      - --import-realm
      - --health-enabled=true
    environment:
      # Admin bootstrap (override at deploy time for any non-local env).
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak-dev-only
      # HTTP listener (dev only — production fronts behind a TLS-terminating proxy)
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test:
        - CMD-SHELL
        - 'exec 3<>/dev/tcp/localhost/8080 && echo -e "GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n" >&3 && head -n 1 <&3 | grep -q "200"'
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

volumes:
  keycloak-db-data:
