# Prometheus Configuration for Traffic Management System
# Scrapes metrics from YouTube Decision Processor on port 8004

global:
  scrape_interval: 5s      # Scrape targets every 5 seconds
  evaluation_interval: 5s   # Evaluate rules every 5 seconds
  scrape_timeout: 4s        # Timeout for scraping

# Scrape configurations
scrape_configs:
  # Traffic Management System Metrics
  - job_name: 'traffic-system'
    scrape_interval: 5s
    scrape_timeout: 4s
    static_configs:
      # Try host.docker.internal first (works on Mac/Windows)
      # If that doesn't work, use the host IP or localhost
      - targets: ['host.docker.internal:8004']
        labels:
          service: 'youtube-processor'
          environment: 'development'
    
    # Metrics path
    metrics_path: '/metrics'
    
    # For Linux, you may need to use:
    # - targets: ['172.17.0.1:8004']  # Docker bridge IP
    # Or add extra_hosts in docker-compose:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['localhost:9090']
