<?xml version="1.0" encoding="UTF-8"?>
<!-- netconvert config: assemble network.net.xml from the plain files in this
     directory. Run from the repo root with:

         netconvert -c simulation/scenarios/_network_src/netconvert.cfg

     Then copy the produced network.net.xml into each scenario that uses
     this shared topology (rush-hour, demo). -->
<configuration>
  <input>
    <node-files value="plain.nod.xml"/>
    <edge-files value="plain.edg.xml"/>
    <connection-files value="plain.con.xml"/>
    <tllogic-files value="plain.tll.xml"/>
  </input>
  <output>
    <output-file value="network.net.xml"/>
  </output>
  <processing>
    <no-internal-links value="false"/>
  </processing>
</configuration>
